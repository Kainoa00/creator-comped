<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" fill="none">
  <defs>
    <linearGradient id="hiveGrad" x1="20" y1="10" x2="100" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#4A90E2"/>
    </linearGradient>
    <linearGradient id="hiveGradDark" x1="20" y1="10" x2="100" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e05a2a"/>
      <stop offset="100%" stop-color="#3a78c0"/>
    </linearGradient>
  </defs>
  <!-- Beehive stacked ridges from top to bottom -->
  <!-- Top cap (smallest) -->
  <rect x="42" y="8" width="36" height="16" rx="8" fill="url(#hiveGrad)" stroke="url(#hiveGradDark)" stroke-width="2"/>
  <!-- Ridge 2 -->
  <rect x="34" y="26" width="52" height="16" rx="8" fill="url(#hiveGrad)" stroke="url(#hiveGradDark)" stroke-width="2"/>
  <!-- Ridge 3 -->
  <rect x="26" y="44" width="68" height="16" rx="8" fill="url(#hiveGrad)" stroke="url(#hiveGradDark)" stroke-width="2"/>
  <!-- Ridge 4 (widest, has entrance hole) -->
  <rect x="22" y="62" width="76" height="16" rx="8" fill="url(#hiveGrad)" stroke="url(#hiveGradDark)" stroke-width="2"/>
  <!-- Ridge 5 -->
  <rect x="26" y="80" width="68" height="16" rx="8" fill="url(#hiveGrad)" stroke="url(#hiveGradDark)" stroke-width="2"/>
  <!-- Ridge 6 (bottom, narrower) -->
  <rect x="34" y="98" width="52" height="16" rx="8" fill="url(#hiveGrad)" stroke="url(#hiveGradDark)" stroke-width="2"/>
  <!-- Entrance hole -->
  <circle cx="60" cy="70" r="11" fill="#0B0B0D"/>
</svg>
